<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartToolsHub - Free Online Tools</title>
<meta name="description" content="SmartToolsHub offers free online tools including calculators, image tools, text tools, PDF tools and SEO tools.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
/* ── Hero ── */
.home-hero {
    background: #1e2433;
    text-align: center;
    padding: 52px 20px 42px;
    position: sticky;
    top: 58px;
    z-index: 999;
}
.home-hero h1 { font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -0.8px; margin-bottom: 10px; line-height: 1.2; }
.home-hero h1 span { color: #7c6ff7; }
.home-hero p  { font-size: 16px; color: #8896b3; max-width: 500px; margin: 0 auto; }

/* ── Main wrap ── */
.home-main { max-width: 1200px; margin: 0 auto; padding: 36px 24px 72px; }

/* ── Section heading ── */
.sec-title { font-size: 17px; font-weight: 700; color: #1e2433; margin-bottom: 18px; margin-top: 36px; }
.sec-title:first-child { margin-top: 0; }

/* ── Calculator & text tool cards ── */
.hp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(218px, 1fr));
    gap: 16px;
}
.hp-card {
    background: #fff;
    border: 1.5px solid #e8eaf0;
    border-radius: 14px;
    padding: 20px 18px 18px;
    transition: 0.18s;
}
.hp-card:hover { border-color: #b5aeee; box-shadow: 0 4px 18px rgba(90,79,207,0.09); }

.hp-card-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700; color: #1e2433;
    margin-bottom: 14px;
}
.hp-card-title .ico {
    width: 32px; height: 32px;
    background: #f0effe;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
}

.hp-card input[type="date"],
.hp-card input[type="number"],
.hp-card input[type="text"],
.hp-card textarea {
    width: 100%;
    padding: 8px 11px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: #1e2433;
    background: #f7f8fc;
    margin-bottom: 8px;
    outline: none;
    transition: 0.15s;
    box-sizing: border-box;
}
.hp-card input:focus, .hp-card textarea:focus { border-color: #5a4fcf; background: #fff; }
.hp-card input::placeholder, .hp-card textarea::placeholder { color: #c0c9d8; }
.hp-card textarea { height: 68px; resize: none; }

.hp-btn-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 4px; }
.hp-btn {
    background: #5a4fcf; color: #fff; border: none;
    padding: 8px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: 0.15s;
}
.hp-btn:hover { background: #4840b8; }
.hp-btn.sec {
    background: #f0effe; color: #5a4fcf;
    border: 1.5px solid #ddd9f9;
}
.hp-btn.sec:hover { background: #e2deff; }

.hp-result {
    margin-top: 10px; font-size: 13px; font-weight: 600; color: #3d35a8;
    background: #f0effe; border: 1.5px solid #ddd9f9;
    border-radius: 8px; padding: 9px 12px;
    min-height: 18px; display: none;
}
.hp-result.show { display: block; }
#hp-pass-display {
    background: #f0effe; border: 1.5px solid #ddd9f9;
    border-radius: 8px; padding: 9px 12px;
    font-size: 13px; font-weight: 600; color: #3d35a8;
    word-break: break-all; min-height: 36px;
    margin-bottom: 10px;
}
#hp-qr-img { max-width: 100%; margin-top: 10px; border-radius: 8px; display: none; }
</style>
</head>
<body>

<div id="navbar"></div>

<!-- Sticky hero -->
<section class="home-hero">
  <div>
    <h1>Free Online Tools — <span>All in One Place</span></h1>
    <p>Simple, fast and powerful tools for everyday tasks. 100% free.</p>
  </div>
</section>

<div class="home-main">

  <!-- POPULAR CALCULATORS -->
  <div class="sec-title">Popular Calculators</div>
  <div class="hp-grid">

    <!-- Age -->
    <div class="hp-card">
      <div class="hp-card-title"><div class="ico">📅</div>Age Calculator</div>
      <input type="date" id="hp-dob">
      <div class="hp-btn-row">
        <button class="hp-btn" onclick="hpCalcAge()">Calculate</button>
        <button class="hp-btn sec" onclick="hpClear('hp-dob','hp-age-r')">Clear</button>
      </div>
      <div class="hp-result" id="hp-age-r"></div>
    </div>

    <!-- BMI -->
    <div class="hp-card">
      <div class="hp-card-title"><div class="ico">⚖️</div>BMI Calculator</div>
      <input type="number" id="hp-weight" placeholder="Weight kg">
      <input type="number" id="hp-height" placeholder="Height cm">
      <div class="hp-btn-row">
        <button class="hp-btn" onclick="hpCalcBMI()">Calculate</button>
        <button class="hp-btn sec" onclick="hpClearM(['hp-weight','hp-height'],'hp-bmi-r')">Clear</button>
      </div>
      <div class="hp-result" id="hp-bmi-r"></div>
    </div>

    <!-- Percentage -->
    <div class="hp-card">
      <div class="hp-card-title"><div class="ico">📊</div>Percentage Calculator</div>
      <input type="number" id="hp-pct" placeholder="Percent">
      <input type="number" id="hp-num" placeholder="Number">
      <div class="hp-btn-row">
        <button class="hp-btn" onclick="hpCalcPct()">Calculate</button>
        <button class="hp-btn sec" onclick="hpClearM(['hp-pct','hp-num'],'hp-pct-r')">Clear</button>
      </div>
      <div class="hp-result" id="hp-pct-r"></div>
    </div>

    <!-- EMI -->
    <div class="hp-card">
      <div class="hp-card-title"><div class="ico">💰</div>Loan EMI Calculator</div>
      <input type="number" id="hp-loan" placeholder="Loan amount">
      <input type="number" id="hp-rate" placeholder="Interest %">
      <input type="number" id="hp-months" placeholder="Months">
      <div class="hp-btn-row">
        <button class="hp-btn" onclick="hpCalcEMI()">Calculate</button>
        <button class="hp-btn sec" onclick="hpClearM(['hp-loan','hp-rate','hp-months'],'hp-emi-r')">Clear</button>
      </div>
      <div class="hp-result" id="hp-emi-r"></div>
    </div>

  </div>

  <!-- POPULAR TEXT TOOLS -->
  <div class="sec-title">Popular Text Tools</div>
  <div class="hp-grid">

    <!-- Password -->
    <div class="hp-card">
      <div class="hp-card-title"><div class="ico">🔐</div>Password Generator</div>
      <div id="hp-pass-display"></div>
      <div class="hp-btn-row">
        <button class="hp-btn" onclick="hpGenPass()">Generate</button>
        <button class="hp-btn sec" onclick="hpCopyPass()">Copy</button>
        <button class="hp-btn sec" onclick="document.getElementById('hp-pass-display').textContent=''">Clear</button>
      </div>
    </div>

    <!-- QR -->
    <div class="hp-card">
      <div class="hp-card-title"><div class="ico">📱</div>QR Code Generator</div>
      <input type="text" id="hp-qr-text" placeholder="Enter text or URL">
      <div class="hp-btn-row">
        <button class="hp-btn" onclick="hpGenQR()">Generate</button>
        <button class="hp-btn sec" onclick="hpDlQR()">Download</button>
        <button class="hp-btn sec" onclick="hpClearQR()">Clear</button>
      </div>
      <img id="hp-qr-img">
    </div>

    <!-- Text Repeater -->
    <div class="hp-card">
      <div class="hp-card-title"><div class="ico">🔁</div>Text Repeater</div>
      <input type="text" id="hp-rep-text" placeholder="Text">
      <input type="number" id="hp-rep-times" placeholder="Times">
      <div class="hp-btn-row">
        <button class="hp-btn" onclick="hpRepeat()">Generate</button>
        <button class="hp-btn sec" onclick="hpClearM(['hp-rep-text','hp-rep-times'],'hp-rep-r')">Clear</button>
      </div>
      <div class="hp-result" id="hp-rep-r" style="word-break:break-all;max-height:60px;overflow:auto;"></div>
    </div>

    <!-- Word Counter -->
    <div class="hp-card">
      <div class="hp-card-title"><div class="ico">📝</div>Word Counter</div>
      <textarea id="hp-word-text" placeholder="Enter text"></textarea>
      <div class="hp-btn-row">
        <button class="hp-btn" onclick="hpCountWords()">Count</button>
        <button class="hp-btn sec" onclick="hpClear('hp-word-text','hp-word-r')">Clear</button>
      </div>
      <div class="hp-result" id="hp-word-r"></div>
    </div>

  </div>

</div><!-- end home-main -->

<div id="footer"></div>
<script src="js/loadcomponents.js"></script>
<script src="js/sticky.js"></script>
<script>
function show(id,txt){ var e=document.getElementById(id); e.textContent=txt; e.classList.add('show'); }
function hpCalcAge(){
    var dob=document.getElementById('hp-dob').value;
    if(!dob){show('hp-age-r','Select your date of birth.');return;}
    var b=new Date(dob),t=new Date();
    var y=t.getFullYear()-b.getFullYear(),m=t.getMonth()-b.getMonth(),d=t.getDate()-b.getDate();
    if(d<0){m--;d+=new Date(t.getFullYear(),t.getMonth(),0).getDate();}
    if(m<0){y--;m+=12;}
    show('hp-age-r',y+' yrs, '+m+' months, '+d+' days');
}
function hpCalcBMI(){
    var w=parseFloat(document.getElementById('hp-weight').value),h=parseFloat(document.getElementById('hp-height').value);
    if(!w||!h){show('hp-bmi-r','Enter weight and height.');return;}
    var bmi=(w/((h/100)*(h/100))).toFixed(1);
    var c=bmi<18.5?'Underweight':bmi<25?'Normal weight':bmi<30?'Overweight':'Obese';
    show('hp-bmi-r','BMI: '+bmi+' — '+c);
}
function hpCalcPct(){
    var p=parseFloat(document.getElementById('hp-pct').value),n=parseFloat(document.getElementById('hp-num').value);
    if(isNaN(p)||isNaN(n)){show('hp-pct-r','Enter both values.');return;}
    show('hp-pct-r',p+'% of '+n+' = '+((p/100)*n).toFixed(2));
}
function hpCalcEMI(){
    var p=parseFloat(document.getElementById('hp-loan').value),r=parseFloat(document.getElementById('hp-rate').value),mo=parseInt(document.getElementById('hp-months').value);
    if(!p||!r||!mo){show('hp-emi-r','Fill all three fields.');return;}
    var ri=r/12/100,emi=(p*ri*Math.pow(1+ri,mo))/(Math.pow(1+ri,mo)-1);
    show('hp-emi-r','EMI: ₹'+emi.toFixed(2)+'/month');
}
function hpGenPass(){
    var c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
    var p=Array.from({length:16},function(){return c[Math.floor(Math.random()*c.length)];}).join('');
    document.getElementById('hp-pass-display').textContent=p;
}
function hpCopyPass(){
    var t=document.getElementById('hp-pass-display').textContent;
    if(t) navigator.clipboard.writeText(t).then(function(){alert('Copied!');});
}
function hpGenQR(){
    var text=document.getElementById('hp-qr-text').value.trim();
    if(!text){alert('Enter text or URL.');return;}
    var img=document.getElementById('hp-qr-img');
    img.src='https://api.qrserver.com/v1/create-qr-code/?size=160x160&data='+encodeURIComponent(text);
    img.style.display='block';
}
function hpDlQR(){
    var img=document.getElementById('hp-qr-img');
    if(!img.src||img.style.display==='none'){alert('Generate a QR code first.');return;}
    var a=document.createElement('a');a.href=img.src;a.download='qrcode.png';a.click();
}
function hpClearQR(){
    document.getElementById('hp-qr-text').value='';
    var img=document.getElementById('hp-qr-img');img.src='';img.style.display='none';
}
function hpRepeat(){
    var t=document.getElementById('hp-rep-text').value,n=parseInt(document.getElementById('hp-rep-times').value);
    if(!t||isNaN(n)||n<1){show('hp-rep-r','Enter text and a number.');return;}
    if(n>500){show('hp-rep-r','Max 500 repetitions.');return;}
    show('hp-rep-r',Array(n).fill(t).join(' '));
}
function hpCountWords(){
    var t=document.getElementById('hp-word-text').value.trim();
    if(!t){show('hp-word-r','Enter some text.');return;}
    var w=t.split(/\s+/).filter(Boolean).length;
    show('hp-word-r','Words: '+w+' | Chars: '+t.length);
}
function hpClear(a,b){
    document.getElementById(a).value='';
    var e=document.getElementById(b);e.textContent='';e.classList.remove('show');
}
function hpClearM(ids,r){
    ids.forEach(function(id){document.getElementById(id).value='';});
    var e=document.getElementById(r);e.textContent='';e.classList.remove('show');
}
function searchTools(){
    var q=document.getElementById('toolSearch');
    if(q) console.log(q.value);
}
</script>
</body>
</html>
