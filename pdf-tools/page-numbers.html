<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Page Numbers to PDF | SmartToolsHub</title>
<link rel="canonical" href="https://smarttoolshub-pro.netlify.app/pdf-tools/page-numbers.html">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<div id="navbar"></div>
<section class="page-hero">
  <div class="container"><h1>🔢 Add Page Numbers</h1><p>Insert page numbers into your PDF</p></div>
</section>
<div class="sticky-breadcrumb">
  <div class="container"><div class="breadcrumb"><a href="/index.html">Home</a> &gt; <a href="/pdf-tools.html">PDF Tools</a> &gt; <span>Add Page Numbers</span></div></div>
</div>
<div class="container"><div class="page-content">
<div class="card">
<label>Upload PDF</label>
<input type="file" id="pnFile" accept=".pdf">
<label style="margin-top:6px;">Position</label>
<select id="pnPosition">
  <option value="bottom-center">Bottom Center</option>
  <option value="bottom-right">Bottom Right</option>
  <option value="bottom-left">Bottom Left</option>
  <option value="top-center">Top Center</option>
  <option value="top-right">Top Right</option>
  <option value="top-left">Top Left</option>
</select>
<label>Start numbering from</label>
<input type="number" id="pnStart" value="1" min="1" style="width:120px;">
<label>Font size</label>
<input type="number" id="pnSize" value="12" min="8" max="24" style="width:120px;">
<div style="display:flex;gap:8px;margin-top:4px;">
  <button onclick="addPageNumbers()">Add Page Numbers</button>
  <button class="secondary" onclick="clearPN()">Clear</button>
</div>
<div id="pnResult" style="margin-top:12px;font-size:13px;"></div>
</div>
<div class="card"><h2>About Add Page Numbers</h2>
<p>Automatically insert page numbers at any position on every page of your PDF. Choose the position, starting number and font size. Works entirely in your browser.</p>
</div>
<script>
async function addPageNumbers(){
  var f=document.getElementById('pnFile');
  var r=document.getElementById('pnResult');
  if(!f.files||!f.files[0]){r.textContent='Please upload a PDF.';r.style.color='#e53e3e';return;}
  var pos=document.getElementById('pnPosition').value;
  var start=parseInt(document.getElementById('pnStart').value)||1;
  var size=parseInt(document.getElementById('pnSize').value)||12;
  r.textContent='Adding page numbers...';r.style.color='#5a4fcf';
  try{
    var ab=await f.files[0].arrayBuffer();
    var pdf=await PDFLib.PDFDocument.load(ab);
    var font=await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
    var count=pdf.getPageCount();
    for(var i=0;i<count;i++){
      var pg=pdf.getPage(i);
      var w=pg.getWidth(), h=pg.getHeight();
      var txt=''+( start+i);
      var tw=font.widthOfTextAtSize(txt,size);
      var margin=24;
      var x,y;
      if(pos==='bottom-center'){x=(w-tw)/2;y=margin;}
      else if(pos==='bottom-right'){x=w-tw-margin;y=margin;}
      else if(pos==='bottom-left'){x=margin;y=margin;}
      else if(pos==='top-center'){x=(w-tw)/2;y=h-margin-size;}
      else if(pos==='top-right'){x=w-tw-margin;y=h-margin-size;}
      else{x=margin;y=h-margin-size;}
      pg.drawText(txt,{x:x,y:y,size:size,font:font,color:PDFLib.rgb(0.2,0.2,0.2)});
    }
    var bytes=await pdf.save();
    var blob=new Blob([bytes],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='numbered.pdf';a.textContent='⬇ Download PDF with Page Numbers';
    a.style.cssText='display:inline-block;background:#5a4fcf;color:#fff;padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;margin-top:4px;text-decoration:none;';
    r.textContent='';r.appendChild(a);
  }catch(e){r.textContent='Error: '+e.message;r.style.color='#e53e3e';}
}
function clearPN(){document.getElementById('pnFile').value='';document.getElementById('pnResult').innerHTML='';}
</script>
</div></div>
<div id="footer"></div>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="../js/loadcomponents.js"></script>
<script src="../js/sticky.js"></script>
</body></html>
