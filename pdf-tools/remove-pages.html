<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Pages from PDF | SmartToolsHub</title>
<link rel="canonical" href="https://smarttoolshub-pro.netlify.app/pdf-tools/remove-pages.html">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="navbar"></div>
<section class="page-hero">
  <div class="container"><h1>🗑️ Remove Pages</h1><p>Delete specific pages from your PDF</p></div>
</section>
<div class="sticky-breadcrumb">
  <div class="container"><div class="breadcrumb"><a href="/index.html">Home</a> &gt; <a href="/pdf-tools.html">PDF Tools</a> &gt; <span>Remove Pages</span></div></div>
</div>
<div class="container"><div class="page-content">

<div class="card">
  <label>Upload PDF</label>
  <input type="file" id="rmFile" accept=".pdf">
  <div id="rmPageInfo" style="font-size:12.5px;color:#5a4fcf;margin-top:6px;min-height:18px;"></div>
  <label style="margin-top:6px;">Pages to remove <span style="color:#94a3b8;font-size:12px;">(e.g. 1, 3, 5-7)</span></label>
  <input type="text" id="rmPages" placeholder="e.g. 1, 3, 5-7, 10">
  <div style="display:flex;gap:8px;margin-top:4px;">
    <button onclick="removePages()">Remove Pages</button>
    <button class="secondary" onclick="clearRM()">Clear</button>
  </div>
  <div id="rmResult" style="margin-top:12px;font-size:13px;"></div>
</div>
<div class="card">
  <h2>About Remove Pages</h2>
  <p>Enter page numbers or ranges to delete from your PDF. For example: "1, 3, 5-7" removes pages 1, 3, 5, 6 and 7. The remaining pages are saved into a new PDF. Works entirely in your browser.</p>
</div>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
document.getElementById('rmFile').addEventListener('change', async function(){
  var info = document.getElementById('rmPageInfo');
  if(!this.files||!this.files[0]){ info.textContent=''; return; }
  try{
    var ab  = await this.files[0].arrayBuffer();
    var pdf = await PDFLib.PDFDocument.load(ab);
    info.textContent = 'PDF loaded — ' + pdf.getPageCount() + ' pages total.';
  }catch(e){ info.textContent='Could not read PDF.'; }
});

function parsePageInput(str, total){
  var pages = new Set();
  var parts = str.split(',');
  parts.forEach(function(p){
    p = p.trim();
    if(p.indexOf('-') !== -1){
      var bounds = p.split('-');
      var a = parseInt(bounds[0]), b = parseInt(bounds[1]);
      for(var i=a;i<=b;i++) if(i>=1&&i<=total) pages.add(i-1);
    } else {
      var n = parseInt(p);
      if(!isNaN(n)&&n>=1&&n<=total) pages.add(n-1);
    }
  });
  return pages;
}

async function removePages(){
  var file = document.getElementById('rmFile').files[0];
  var input = document.getElementById('rmPages').value.trim();
  var r = document.getElementById('rmResult');
  if(!file){ r.innerHTML='<span style="color:#e53e3e;">Please upload a PDF.</span>'; return; }
  if(!input){ r.innerHTML='<span style="color:#e53e3e;">Enter page numbers to remove.</span>'; return; }
  r.innerHTML='<span style="color:#5a4fcf;">Processing...</span>';
  try{
    var ab  = await file.arrayBuffer();
    var src = await PDFLib.PDFDocument.load(ab);
    var total = src.getPageCount();
    var toRemove = parsePageInput(input, total);
    if(toRemove.size === 0){ r.innerHTML='<span style="color:#e53e3e;">No valid pages found. Check your input.</span>'; return; }
    if(toRemove.size >= total){ r.innerHTML='<span style="color:#e53e3e;">Cannot remove all pages.</span>'; return; }

    var newPdf = await PDFLib.PDFDocument.create();
    var keepIndices = [];
    for(var i=0;i<total;i++){ if(!toRemove.has(i)) keepIndices.push(i); }
    var pages = await newPdf.copyPages(src, keepIndices);
    pages.forEach(function(p){ newPdf.addPage(p); });

    var bytes = await newPdf.save();
    var blob  = new Blob([bytes],{type:'application/pdf'});
    var url   = URL.createObjectURL(blob);
    var a     = document.createElement('a');
    a.href=url; a.download='removed-pages.pdf';
    a.textContent='⬇ Download PDF ('+ keepIndices.length +' pages remaining)';
    a.style.cssText='display:inline-block;background:#5a4fcf;color:#fff;padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none;';
    r.innerHTML=''; r.appendChild(a);
  }catch(e){ r.innerHTML='<span style="color:#e53e3e;">Error: '+e.message+'</span>'; }
}

function clearRM(){
  document.getElementById('rmFile').value='';
  document.getElementById('rmPageInfo').textContent='';
  document.getElementById('rmPages').value='';
  document.getElementById('rmResult').innerHTML='';
}
</script>

</div></div>
<div id="footer"></div>

<script src="../js/loadcomponents.js"></script>
<script src="../js/sticky.js"></script>
</body></html>
