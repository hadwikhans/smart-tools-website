<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge PDF | SmartToolsHub</title>
<link rel="canonical" href="https://smarttoolshub-pro.netlify.app/pdf-tools/merge-pdf.html">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="navbar"></div>
<section class="page-hero">
  <div class="container"><h1>📎 Merge PDF</h1><p>Combine multiple PDF files into one document</p></div>
</section>
<div class="sticky-breadcrumb">
  <div class="container"><div class="breadcrumb"><a href="/index.html">Home</a> &gt; <a href="/pdf-tools.html">PDF Tools</a> &gt; <span>Merge PDF</span></div></div>
</div>
<div class="container"><div class="page-content">
<div class="card">
<p>Select 2 or more PDF files to merge into one.</p>
<input type="file" id="pdfFiles" accept=".pdf" multiple>
<div style="display:flex;gap:8px;margin-top:4px;">
<button onclick="mergePDFs()">Merge PDFs</button>
<button class="secondary" onclick="clearMerge()">Clear</button>
</div>
<div id="mergeResult" style="margin-top:12px;font-size:13px;color:#5a4fcf;"></div>
</div>
<div class="card"><h2>About PDF Merge</h2><p>Merge multiple PDF files into a single document directly in your browser using PDF-lib. No uploads — your files stay private.</p></div>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
async function mergePDFs(){var i=document.getElementById('pdfFiles');var r=document.getElementById('mergeResult');if(!i.files||i.files.length<2){r.textContent='Select at least 2 PDF files.';return;}r.textContent='Merging...';try{var m=await PDFLib.PDFDocument.create();for(var x=0;x<i.files.length;x++){var ab=await i.files[x].arrayBuffer();var p=await PDFLib.PDFDocument.load(ab);var pg=await m.copyPages(p,p.getPageIndices());pg.forEach(function(pp){m.addPage(pp);});}var b=await m.save();var blob=new Blob([b],{type:'application/pdf'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='merged.pdf';a.textContent='⬇ Download Merged PDF';r.textContent='';r.appendChild(a);}catch(e){r.textContent='Error: '+e.message;}}
function clearMerge(){document.getElementById('pdfFiles').value='';document.getElementById('mergeResult').textContent='';}
</script>
</div></div>
<div id="footer"></div>
<script src="../js/loadcomponents.js"></script>
<script src="../js/script.js"></script>
<script src="../js/sticky.js"></script>
</body></html>
