<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Watermark to PDF | SmartToolsHub</title>
<link rel="canonical" href="https://smarttoolshub-pro.netlify.app/pdf-tools/watermark-pdf.html">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<div id="navbar"></div>
<section class="page-hero">
  <div class="container"><h1>💧 Add Watermark</h1><p>Stamp text watermark on every PDF page</p></div>
</section>
<div class="sticky-breadcrumb">
  <div class="container"><div class="breadcrumb"><a href="/index.html">Home</a> &gt; <a href="/pdf-tools.html">PDF Tools</a> &gt; <span>Add Watermark</span></div></div>
</div>
<div class="container"><div class="page-content">
<div class="card">
<label>Upload PDF</label>
<input type="file" id="wmFile" accept=".pdf">
<label style="margin-top:6px;">Watermark Text</label>
<input type="text" id="wmText" placeholder="e.g. CONFIDENTIAL, DRAFT, Sample...">
<label>Text Color</label>
<select id="wmColor">
  <option value="gray">Gray</option>
  <option value="red">Red</option>
  <option value="blue">Blue</option>
  <option value="black">Black</option>
</select>
<label>Opacity</label>
<div style="display:flex;align-items:center;gap:12px;">
  <input type="range" id="wmOpacity" min="0.05" max="0.5" step="0.05" value="0.15" style="flex:1;margin-bottom:0;">
  <span id="wmOpVal" style="font-size:13px;color:#5a4fcf;font-weight:600;min-width:36px;">15%</span>
</div>
<br>
<label>Font Size</label>
<input type="number" id="wmSize" value="48" min="12" max="120" style="width:120px;">
<div style="display:flex;gap:8px;margin-top:8px;">
  <button onclick="addWatermark()">Add Watermark</button>
  <button class="secondary" onclick="clearWM()">Clear</button>
</div>
<div id="wmResult" style="margin-top:12px;font-size:13px;"></div>
</div>
<div class="card"><h2>About Add Watermark</h2>
<p>Stamp a diagonal text watermark on every page of your PDF. Choose the text, color, opacity and size. The watermark is embedded permanently. Processing is done in your browser.</p>
</div>
<script>
document.getElementById('wmOpacity').addEventListener('input',function(){
  document.getElementById('wmOpVal').textContent=Math.round(this.value*100)+'%';
});
async function addWatermark(){
  var f=document.getElementById('wmFile');
  var r=document.getElementById('wmResult');
  var txt=document.getElementById('wmText').value.trim();
  if(!f.files||!f.files[0]){r.textContent='Please upload a PDF.';r.style.color='#e53e3e';return;}
  if(!txt){r.textContent='Enter watermark text.';r.style.color='#e53e3e';return;}
  var col=document.getElementById('wmColor').value;
  var opacity=parseFloat(document.getElementById('wmOpacity').value);
  var size=parseInt(document.getElementById('wmSize').value)||48;
  var rgb={gray:PDFLib.rgb(0.5,0.5,0.5),red:PDFLib.rgb(0.8,0.1,0.1),blue:PDFLib.rgb(0.1,0.1,0.8),black:PDFLib.rgb(0,0,0)};
  r.textContent='Adding watermark...';r.style.color='#5a4fcf';
  try{
    var ab=await f.files[0].arrayBuffer();
    var pdf=await PDFLib.PDFDocument.load(ab);
    var font=await pdf.embedFont(PDFLib.StandardFonts.HelveticaBold);
    var count=pdf.getPageCount();
    for(var i=0;i<count;i++){
      var pg=pdf.getPage(i);
      var w=pg.getWidth(),h=pg.getHeight();
      var tw=font.widthOfTextAtSize(txt,size);
      pg.drawText(txt,{
        x:(w-tw)/2, y:(h-size)/2,
        size:size, font:font,
        color:rgb[col]||rgb.gray,
        opacity:opacity,
        rotate:PDFLib.degrees(45)
      });
    }
    var bytes=await pdf.save();
    var blob=new Blob([bytes],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='watermarked.pdf';a.textContent='⬇ Download Watermarked PDF';
    a.style.cssText='display:inline-block;background:#5a4fcf;color:#fff;padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;margin-top:4px;text-decoration:none;';
    r.textContent='';r.appendChild(a);
  }catch(e){r.textContent='Error: '+e.message;r.style.color='#e53e3e';}
}
function clearWM(){document.getElementById('wmFile').value='';document.getElementById('wmText').value='';document.getElementById('wmResult').innerHTML='';}
</script>
</div></div>
<div id="footer"></div>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="../js/loadcomponents.js"></script>
<script src="../js/sticky.js"></script>
</body></html>
