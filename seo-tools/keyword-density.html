<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyword Density Checker | SmartToolsHub</title>
<link rel="canonical" href="https://smarttoolshub-pro.netlify.app/seo-tools/keyword-density.html">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="navbar"></div>
<section class="page-hero">
  <div class="container"><h1>🔍 Keyword Density Checker</h1><p>Analyze keyword frequency in your content</p></div>
</section>
<div class="sticky-breadcrumb">
  <div class="container"><div class="breadcrumb"><a href="/index.html">Home</a> &gt; <a href="/seo-tools.html">SEO Tools</a> &gt; <span>Keyword Density</span></div></div>
</div>
<div class="container"><div class="page-content">
<div class="card">
<label>Paste your content</label>
<textarea id="kdText" placeholder="Paste your article or text here..."></textarea>
<label>Keyword to check (optional)</label>
<input type="text" id="kdKeyword" placeholder="e.g. online tools">
<div style="display:flex;gap:8px;">
<button onclick="checkDensity()">Check Density</button>
<button class="secondary" onclick="clearKD()">Clear</button>
</div>
<div id="kdResult" style="margin-top:14px;font-size:13px;"></div>
</div>
<div class="card"><h2>About Keyword Density</h2><p>Ideal keyword density is 1–3%. Too low means the topic isn't clear to search engines; too high may be penalized as keyword stuffing.</p></div>
<script>
function checkDensity(){var t=document.getElementById('kdText').value.trim();var kw=document.getElementById('kdKeyword').value.trim().toLowerCase();var r=document.getElementById('kdResult');if(!t){r.innerHTML='Enter some text.';return;}var words=t.split(/\s+/).filter(Boolean);var total=words.length;var html='<p style="margin-bottom:8px;"><strong>Total words:</strong> '+total+'</p>';if(kw){var cnt=words.filter(function(w){return w.toLowerCase().replace(/[^a-z0-9]/g,'')===kw.replace(/[^a-z0-9]/g,'');}).length;var den=((cnt/total)*100).toFixed(2);html+='<p style="margin-bottom:12px;color:#5a4fcf;"><strong>"'+kw+'"</strong> appears <strong>'+cnt+'</strong> times — density: <strong>'+den+'%</strong></p>';}var freq={};words.forEach(function(w){var k=w.toLowerCase().replace(/[^a-z0-9]/g,'');if(k.length>2)freq[k]=(freq[k]||0)+1;});var sorted=Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,10);html+='<p style="margin-bottom:8px;font-weight:600;">Top keywords:</p><ul style="padding-left:18px;">';sorted.forEach(function(e){html+='<li style="margin-bottom:4px;font-size:13px;">'+e[0]+': '+e[1]+' ('+((e[1]/total)*100).toFixed(2)+'%)</li>';});html+='</ul>';r.innerHTML=html;}
function clearKD(){document.getElementById('kdText').value='';document.getElementById('kdKeyword').value='';document.getElementById('kdResult').innerHTML='';}
</script>
</div></div>
<div id="footer"></div>
<script src="../js/loadcomponents.js"></script>
<script src="../js/script.js"></script>
<script src="../js/sticky.js"></script>
</body></html>
